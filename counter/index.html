<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="index.css">
       <script>
        let count  = localStorage.getItem("cnt");
        if (count === null) {
            count = 0;
        } else {
            count = parseInt(count);
        }
        document.getElementById("result").innerText = count;
        function increaseValue() {
            count++;
            updateDisplay();
        }
        function decreaseValue() {
            count--;
            updateDisplay();
        }
        function updateDisplay() {
            document.getElementById("result").innerText = count;
            localStorage.setItem("cnt", count);
        }
    </script>
</head>
<body>
    <div class="counter-container">
        <h2>Counter</h2>
        <div class="counter-display">
            <p id="result">0</p>
        </div>
        <div class="button-group">
            <input type="button" class="decrease" value="Decrease" onclick="decreaseValue()">
            <input type="button" class="increase" value="Increase" onclick="increaseValue()">
        </div>
    </div>
 

</body>
</html>
