<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Basic Timer</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f5f5f5;
			margin: 0;
			padding: 30px;
		}

		.timer-box {
			width: 280px;
			margin: 90px auto;
			text-align: center;
			border: 1px solid #4400ff;
			border-radius: 8px;
			padding: 20px;
			background-color: #292cffde;
		}
		.timer-box:hover {
			box-shadow: 0 4px 8px 8px rgba(0, 0, 0, 0.1);
		}
		h2 {
			margin-top: 0;
			margin-bottom: 20px;
			font-size: 22px;
			color: #ffffff;
			text-decoration: underline;
			 
		}

		#count {
			font-size: 40px;
			font-weight: bold;
			margin: 15px 0 20px;
			color: #ffffff;
		}

		button {
			padding: 8px 18px;
			margin: 5px;
			border: 1px solid #000000;
			background-color: #e5ff6f;
			border-radius: 4px;
			cursor: pointer;
		}

		button:hover {
			background:linear-gradient(to bottom, #04ff58, #e7e7e7);
		}
	</style>
</head>
<body>
	<div class="timer-box"	><h2>Timer</h2>
		<div id="count">0</div>

		<button id="startBtn">Start</button>
		<button id="pauseBtn">Pause</button>
		<button id="stopBtn">Stop</button>
	</div>
    </div>
</body>
	<script>
		let count = 0;
		let intervalId = null;

		const countEl = document.getElementById("count");
		const startBtn = document.getElementById("startBtn");
		const pauseBtn = document.getElementById("pauseBtn");
		const stopBtn = document.getElementById("stopBtn");

		function updateDisplay() {
			countEl.textContent = count;
		}

		function clearRunningInterval() {
			if (intervalId !== null) {
				clearInterval(intervalId);
				intervalId = null;
			}
		}

		startBtn.addEventListener("click", function () {
			clearRunningInterval();
			count = 0;
			updateDisplay();

			intervalId = setInterval(function () {
				count++;
				updateDisplay();

				if (count >= 10) {
					clearRunningInterval();
				}
			}, 1000);
		});

		pauseBtn.addEventListener("click", function () {
			clearRunningInterval();
		});

		stopBtn.addEventListener("click", function () {
			clearRunningInterval();
			count = 0;
			updateDisplay();
		});
	</script>
</body>
</html>
